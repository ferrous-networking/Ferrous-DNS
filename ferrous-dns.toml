# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Ferrous DNS — Configuration                                               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝


# ── Server ────────────────────────────────────────────────────────────────────

[server]
dns_port = 53                           # UDP/TCP port for DNS queries
web_port = 8080                         # HTTP port for the web dashboard and REST API
bind_address = "0.0.0.0"                # Address to bind on; 0.0.0.0 listens on all interfaces

# Enables the Pi-hole v6 compatible API at /api/* so third-party dashboards,
# plugins, and automations that expect the Pi-hole API continue to work.
# When true, the Ferrous dashboard API moves to /ferrous/api/* and the
# frontend discovers the correct prefix automatically via /ferrous-config.js.
pihole_compat = true

# Enable PROXY Protocol v2 on TCP DNS and DoT listeners.
# Only activate when a trusted load balancer (HAProxy, AWS NLB, nginx) is always
# in front — it injects the real client IP before each TCP connection.
# WARNING: enabling this without a load balancer will reject all TCP connections.
# proxy_protocol_enabled = true


# ── Web HTTPS (TLS for Dashboard / API) ──────────────────────────────────────
# When enabled, the web dashboard and REST API are served over HTTPS on the
# same web_port (8080). If cert/key files are missing, falls back to HTTP.

[server.web_tls]
enabled       = true
tls_cert_path = "/data/cert.pem"
tls_key_path  = "/data/key.pem"


# ── Encrypted DNS (DoT / DoH) ─────────────────────────────────────────────────
# Serves DNS-over-TLS (RFC 7858) and/or DNS-over-HTTPS (RFC 8484).
# Requires a TLS certificate and private key in PEM format.
# Default paths point to /data/ — the standard Docker volume for Ferrous DNS.
# If the cert/key files are absent at startup, the affected listeners are skipped
# with a warning; the server continues to serve plain DNS normally.
# For DoH, HTTPS termination is handled by a reverse proxy (nginx/Traefik/Caddy).

# [server.encrypted_dns]
# dot_enabled   = true                    # Enable DoT listener on dot_port
# dot_port      = 853                     # TCP port for DNS-over-TLS (standard: 853)
# doh_enabled   = true                    # Enable /dns-query endpoint on web_port or doh_port
# doh_port      = 443                     # Dedicated port for DoH (omit to co-host on web_port)
# tls_cert_path = "/data/cert.pem"
# tls_key_path  = "/data/key.pem"


# ── DNS Resolution ────────────────────────────────────────────────────────────

[dns]
upstream_servers = []                   # Fallback upstream DNS servers (used when no pool matches)
query_timeout = 3                       # Seconds to wait for an upstream response before timing out
default_strategy = "Parallel"           # Resolution strategy: "Parallel" (fastest wins) or "Sequential"
dnssec_enabled = true                   # Validate DNSSEC signatures on upstream responses
block_private_ptr = true                # Block PTR lookups for private/RFC-1918 IP ranges
block_non_fqdn = true                   # Block queries for names that are not fully qualified domain names
local_domain = "lan"                    # Local domain suffix appended to short hostnames
local_dns_server = "10.0.0.1:53"        # Router/DHCP server — used for PTR lookups to resolve client hostnames


# ── DNS Cache ─────────────────────────────────────────────────────────────────

cache_enabled = true                    # Enable in-memory DNS response cache
cache_ttl = 7200                        # Default TTL (seconds) for cached entries when the record has none
cache_min_ttl = 300                     # Minimum TTL; recommended >= 240 so the refresh job can act before expiry
cache_max_ttl = 86400                   # Maximum TTL; caps values returned by upstream
cache_max_entries = 200000              # Maximum number of entries the cache can hold
cache_eviction_strategy = "hit_rate"    # Eviction policy: "hit_rate", "lfu", or "lru"
cache_compaction_interval = 600         # Seconds between full cache compaction runs (removes expired entries)
cache_batch_eviction_percentage = 0.1   # Fraction of cache to evict in one pass when full (0.1 = 10%)
cache_adaptive_thresholds = false       # Automatically tune eviction thresholds based on observed hit rates
# Number of internal cache shards (DashMap).
# When omitted, auto-detected as 4x CPU cores rounded up to the next power of 2
# (e.g. RPi 4 = 16, 8-core server = 32, 16-core = 64).
# cache_shard_amount = 512


# ── Cache: Optimistic Refresh ─────────────────────────────────────────────────
# Background refresh renews popular entries before they expire, keeping cache hit rate high.

cache_optimistic_refresh = true         # Refresh entries in the background before they expire
cache_refresh_threshold = 0.75          # Fraction of TTL remaining at which a background refresh is triggered
cache_min_hit_rate = 2.0                # Minimum hit rate (hits/min) to keep an entry alive via refresh
cache_min_frequency = 10                # Minimum total hits before an entry is eligible for refresh
# Time window (seconds) since last access within which an entry is eligible for refresh.
# e.g. 7200 = 2h, 43200 = 12h, 86400 = 24h
cache_access_window_secs = 43200


# ── Cache: LFU-K Eviction ────────────────────────────────────────────────────

cache_min_lfuk_score = 1.5              # Minimum LFU-K score threshold for eviction candidates
cache_lfuk_history_size = 10            # Number of recent access timestamps tracked per entry for scoring


# ── DNS Rate Limiting ────────────────────────────────────────────────────────
# Token bucket rate limiter per client subnet — protects against query floods.
# Tuned for a large household (~100 devices: phones, PCs, smart TVs, IoT).
# Server benchmarked at 482K QPS — the limiter protects against abuse,
# not server capacity. All limits are per /24 subnet (IPv4) or /48 (IPv6).

[dns.rate_limit]
enabled = true                          # Master switch — false disables all rate limiting
queries_per_second = 1000               # ~2.5 QPS/device × 100 devices, covers heavy browsing + IoT
burst_size = 500                        # 2× QPS — absorbs page loads (50+ queries/page) and IoT bursts
ipv4_prefix_len = 24                    # /24 groups the entire home LAN as one subnet
ipv6_prefix_len = 48                    # /48 is the standard home delegation (more generous than /56)
whitelist = []
nxdomain_per_second = 50                # 20% of QPS — IoT devices probe many subdomains legitimately
slip_ratio = 2                          # 50% of rate-limited responses send TC=1 (forces TCP retry)
dry_run = false                         # Enforce limits in production (set true to test first)
tcp_max_connections_per_ip = 30         # Browsers + DoH clients pool TCP; 100 devices behind NAT need room
dot_max_connections_per_ip = 15         # Android Private DNS keeps 2-4 persistent conns per device
stale_entry_ttl_secs = 300              # Evict idle subnet buckets after 5 minutes


# ── DNS Tunneling Detection ──────────────────────────────────────────────────
# Detects and blocks DNS tunneling attempts (data exfiltration, C2 via DNS).
# Phase 1: O(1) checks on the hot path (FQDN/label length, NULL record type).
# Phase 2: statistical analysis in background (entropy, query rate, unique subdomains).
# Configuration is TOML-only — no UI settings page for this feature.

[dns.tunneling_detection]
enabled = true                          # Master switch — enabled by default
action = "block"                        # "alert" | "block" | "throttle"
max_fqdn_length = 120                   # Phase 1: block FQDNs longer than 120 bytes
max_label_length = 50                   # Phase 1: block labels longer than 50 bytes
block_null_queries = true               # Phase 1: block NULL (type 10) record queries
entropy_threshold = 3.8                 # Phase 2: Shannon entropy threshold (bits/char)
query_rate_per_apex = 50                # Phase 2: queries/min per client+apex pair
unique_subdomain_threshold = 30         # Phase 2: unique subdomains/min per client+apex pair
txt_proportion_threshold = 0.05         # Phase 2: TXT > 5% of client traffic
nxdomain_ratio_threshold = 0.20         # Phase 2: NXDOMAIN > 20% for a client+apex pair
confidence_threshold = 0.7              # Phase 2: minimum score to flag (0.0-1.0)
stale_entry_ttl_secs = 300              # Eviction of idle tracking entries (seconds)
domain_whitelist = []                   # Domains exempt from detection
client_whitelist = []                   # Client CIDRs exempt from detection


# ── DGA Detection (Domain Generation Algorithm) ────────────────────────────
# Detects and blocks DGA-generated domain names used by malware (Conficker,
# Mirai, Emotet, CryptoLocker, etc.) to contact C2 servers.
# Phase 1: O(1) checks on the hot path (SLD entropy, consonant/digit ratio, length).
# Phase 2: statistical analysis in background (n-gram scoring, per-client DGA rate).

[dns.dga_detection]
enabled                    = true
action                     = "block"
sld_entropy_threshold      = 3.8
sld_max_length             = 24
consonant_ratio_threshold  = 0.85
digit_ratio_threshold      = 0.3
ngram_score_threshold      = 0.6
dga_rate_per_client        = 10
confidence_threshold       = 0.65
stale_entry_ttl_secs       = 300
domain_whitelist           = []
client_whitelist           = []


# ── NXDomain Hijack Detection ───────────────────────────────────────────────
# Detects ISPs that intercept NXDOMAIN responses with advertising server IPs.
# Background probes test each upstream with random .invalid domains (RFC 6761).
# If an upstream returns A/AAAA instead of NXDOMAIN, the hijack IPs are recorded
# and hot-path responses containing those IPs are converted back to NXDOMAIN.

[dns.nxdomain_hijack]
enabled = true                          # Master switch — enabled by default
action = "block"                        # "alert" | "block" (block converts to NXDOMAIN)
probe_interval_secs = 300               # Seconds between probe rounds (5 min)
probe_timeout_ms = 5000                 # Milliseconds to wait for probe response
probes_per_round = 3                    # Probe queries per upstream per round
hijack_ip_ttl_secs = 3600              # Eviction TTL for unconfirmed hijack IPs (1 hour)


# ── Response IP Filtering (C2 IP Blocking) ──────────────────────────────────
# Blocks DNS responses that resolve to known C2 server IPs.
# Downloads IP threat feeds (abuse.ch, Feodo Tracker, etc.) and checks
# every DNS response against the feed. Opt-in — requires feed URLs.

[dns.response_ip_filter]
enabled = false                                              # opt-in
action = "block"                                             # "alert" | "block"
ip_list_urls = []                                            # add C2 feed URLs
# Example feeds:
# ip_list_urls = [
#   "https://feodotracker.abuse.ch/downloads/ipblocklist.txt",
#   "https://sslbl.abuse.ch/blacklist/sslipblacklist.txt",
# ]
refresh_interval_secs = 86400                                # 24 hours
ip_ttl_secs = 604800                                         # 7 days


# ── Upstream Health Checks ────────────────────────────────────────────────────

[dns.health_check]
interval = 30                           # Seconds between health check probes for each upstream server
timeout = 2000                          # Milliseconds to wait for a health check response
failure_threshold = 3                   # Consecutive failures before marking a server as unhealthy
success_threshold = 2                   # Consecutive successes to mark a server as healthy again


# ── Local DNS Records ────────────────────────────────────────────────────────
# Static A/AAAA records served directly from cache, bypassing upstream resolution.

[[dns.local_records]]
hostname = "viudes"
domain = "local"
ip = "10.0.10.1"
record_type = "A"
ttl = 300

[[dns.local_records]]
hostname = "kakarot"
domain = "server"
ip = "10.0.1.1"
record_type = "A"
ttl = 300

[[dns.pools]]
name = "pool1"
strategy = "Parallel"
priority = 1
servers = ["https://dns.quad9.net/dns-query", "https://cloudflare-dns.com/dns-query", "https://dns.google/dns-query", "https://doh.cleanbrowsing.org/doh/security-filter/", "https://dns.nextdns.io"]

[[dns.pools]]
name = "pool2"
strategy = "Failover"
priority = 2
servers = ["doq://dns.adguard-dns.com:853", "doq://dns.caliph.dev:853"]


# ── Authentication ───────────────────────────────────────────────────────────

[auth]
enabled = true                          # Enable authentication for dashboard and API
session_ttl_hours = 24                  # Session lifetime without "Remember Me" (hours)
remember_me_days = 30                   # Session lifetime with "Remember Me" (days)
login_rate_limit_attempts = 5           # Max failed login attempts before IP lockout
login_rate_limit_window_secs = 900      # Lockout window in seconds (900 = 15 minutes)

[auth.admin]
username = "admin"                      # Admin username (TOML admin — always recoverable via file edit)
password_hash = "$argon2id$v=19$m=19456,t=2,p=1$9pNep2fexSNQtaie80I/Mg$T9qgw7GKOCSUUZdfUNaMLVV13yftftRGoeFmFGFKa8I"                      # Argon2id hash — set via setup wizard or --reset-password CLI


# ── Blocking ──────────────────────────────────────────────────────────────────

[blocking]
enabled = true                          # Enable DNS-based ad/malware blocking
custom_blocked = []                     # Additional domains to block (beyond downloaded blocklists)
whitelist = []                          # Domains to always allow, even if present in a blocklist


# ── Logging ───────────────────────────────────────────────────────────────────

[logging]
level = "info"                          # Log verbosity: "error", "warn", "info", "debug", or "trace"


# ── Database ──────────────────────────────────────────────────────────────────

[database]
path = "ferrous-dns.db"                 # Path to the SQLite database file
log_queries = true                      # Store every DNS query in the database for analytics
queries_log_stored = 30                 # Days to retain query log entries before automatic cleanup

# Minimum seconds between consecutive last-seen DB writes for the same client IP.
# Reduce to track clients more frequently; increase to lower SQLite write pressure.
client_tracking_interval = 60


# ── Database: Query-Log Write Pipeline ────────────────────────────────────────

# Async channel capacity for buffering query log entries before they are flushed to disk.
# At 100k q/s with sample_rate=10 you need ~200_000 for a comfortable 2-second buffer.
query_log_channel_capacity = 10000

# Maximum entries written in a single INSERT transaction.
# Larger batches = fewer transactions and higher throughput.
query_log_max_batch_size = 2000

# Milliseconds between flush cycles. Lower = more frequent small writes;
# higher = fewer but larger batches.
query_log_flush_interval_ms = 200

# Uniform sampling: record 1 out of every N queries (1 = log all).
# At 100k q/s, setting 10 yields ~10k entries/s (~864M rows/day).
query_log_sample_rate = 1


# ── Database: Client-Tracking Write Pipeline ──────────────────────────────────

# Async channel capacity for client last-seen updates.
client_channel_capacity = 4096


# ── Database: Connection Pools ────────────────────────────────────────────────

# Write pool: used by the query-log flush task, client tracking, and admin mutations.
# SQLite WAL serialises writers at the file level so more than ~3 connections
# add no throughput — they only compete for the write lock.
write_pool_max_connections = 3

# Read pool: used exclusively by dashboard and API read endpoints
# so they never compete with write transactions.
read_pool_max_connections = 8

# Read pool: used exclusively by query log and API read endpoints
# so they never compete with write transactions.
query_log_pool_max_connections = 2

# Seconds to wait for the write lock before returning SQLITE_BUSY.
write_busy_timeout_secs = 30

# Seconds to wait for a read connection before returning SQLITE_BUSY.
read_busy_timeout_secs = 15

# Seconds to wait to acquire a read connection from the pool before timeout.
read_acquire_timeout_secs = 15


# ── Database: SQLite Tuning ───────────────────────────────────────────────────

# WAL auto-checkpoint interval (pages). 0 = disabled (manual checkpoint via job).
# Lower = more frequent checkpoints and smaller WAL file;
# higher = less checkpoint overhead under heavy write load.
wal_autocheckpoint = 0

# Seconds between WAL PASSIVE checkpoints (background job).
# Lower = smaller WAL file and faster reads; higher = less checkpoint overhead.
# Recommended: 120 for RPi/SD card, 300 for SSD.
wal_checkpoint_interval_secs = 120

# SQLite page cache size in KB. Higher = more data kept in memory, fewer disk reads.
# Recommended: 8192 for RPi (1GB RAM), 16384 for 2GB+, 32768 for 4GB+.
sqlite_cache_size_kb = 16384

# Memory-mapped I/O size in MB. Allows SQLite to read the DB file directly from
# the OS page cache, bypassing SQLite's own page cache for large sequential scans.
# Recommended: 32 for RPi, 64 for servers, 0 to disable.
sqlite_mmap_size_mb = 64
