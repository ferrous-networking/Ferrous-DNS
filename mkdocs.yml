site_name: Ferrous DNS
site_description: High-performance DNS server with network-wide ad-blocking, written in Rust
site_url: https://ferrous-networking.github.io/ferrous-dns
repo_url: https://github.com/ferrous-networking/ferrous-dns
repo_name: ferrous-networking/ferrous-dns
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Configuration:
    - Overview: configuration/index.md
    - Server: configuration/server.md
    - DNS & Upstreams: configuration/dns.md
    - Rate Limiting: configuration/rate-limiting.md
    - Cache: configuration/cache.md
    - Blocking: configuration/blocking.md
    - Database: configuration/database.md
  - Features:
    - Dashboard: features/dashboard.md
    - Upstream Management: features/upstream-management.md
    - Encrypted DNS: features/encrypted-dns.md
    - Blocking & Filtering: features/blocking-filtering.md
    - Block Services & Schedules: features/block-services.md
    - Client Management: features/client-management.md
    - Malware Detection: features/malware-detection.md
    - Pi-hole Compatibility: features/pihole-compat.md
    - Security: features/security.md
  - API Reference: api.md
  - Architecture:
    - Overview: architecture/overview.md
    - Crate Structure: architecture/crates.md
  - Performance:
    - Benchmarks: performance/benchmarks.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ferrous-networking/ferrous-dns
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/ferrousnetworking/ferrous-dns
