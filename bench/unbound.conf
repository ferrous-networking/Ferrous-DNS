server:
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes
    access-control: 0.0.0.0/0 allow
    cache-max-ttl: 86400
    cache-min-ttl: 300
    msg-cache-size: 256m
    rrset-cache-size: 512m
    # 16 threads — matches Ferrous-DNS CPU count for a fair comparison
    num-threads: 16
    so-reuseport: yes
    outgoing-range: 4096
    num-queries-per-thread: 2048
    # verbosity 1 = info level (matches Ferrous-DNS logging.level = "info")
    verbosity: 1
    do-not-query-localhost: no
    # Rate limiting disabled — dnsperf saturates at high QPS
    ratelimit: 0

forward-zone:
    name: "."
    forward-addr: 8.8.8.8@53
    forward-addr: 1.1.1.1@53
