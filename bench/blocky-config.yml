# =============================================================================
# Blocky — Benchmark Configuration
# =============================================================================
# Mirrors the same constraints applied to all competitors:
#   - Plain UDP upstreams only (8.8.8.8 / 1.1.1.1) — no DoH/DoT
#   - Blocking disabled — isolates raw DNS forwarding performance
#   - Caching enabled (minTime: 60s / maxTime: 86400s) — matches Ferrous-DNS
#   - Query logging disabled — no I/O noise during measurement
#   - Rate limiting disabled — dnsperf saturates at 10k in-flight queries
#   - Log level: info — matches Ferrous-DNS logging.level = "info"
# =============================================================================

# -- Upstreams -----------------------------------------------------------------
# Plain UDP forwarding only — identical to Unbound, AdGuard Home, and Ferrous-DNS.
upstreams:
  groups:
    default:
      - 8.8.8.8
      - 1.1.1.1
  timeout: 2s
  strategy: parallel_best   # query both, return the fastest — equivalent to Ferrous-DNS "Parallel"

# -- Ports --------------------------------------------------------------------
ports:
  dns: 53
  http: 4000    # used for /api/blocking/status healthcheck inside the container

# -- Caching ------------------------------------------------------------------
# Enabled with same settings as Ferrous-DNS: min 300s, max 86400s, prefetching.
caching:
  minTime: 5m
  maxTime: 24h
  prefetching: true         # background refresh — equivalent to Ferrous-DNS cache_optimistic_refresh

# -- Blocking -----------------------------------------------------------------
# No denylists configured — blocking is effectively off.
blocking:
  denylists: {}
  allowlists: {}
  clientGroupsBlock: {}

# -- Logging ------------------------------------------------------------------
log:
  level: info
  format: text
  privacy: false

# -- Query log ----------------------------------------------------------------
# Disabled — reduces SQLite / file I/O pressure during measurement.
queryLog:
  type: none
