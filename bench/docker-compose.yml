# =============================================================================
# Ferrous-DNS Competitor Benchmark — Docker Compose
# =============================================================================
# Starts Ferrous-DNS, Pi-hole, AdGuard Home, Unbound, and Blocky on local ports.
# All servers use the same plain UDP upstreams (8.8.8.8 / 1.1.1.1),
# blocking disabled, logging at info level, and caching enabled for a
# realistic production-like comparison.
#
# Usage:
#   docker compose -f bench/docker-compose.yml up -d
#   ./bench/benchmark.sh --no-docker
#   docker compose -f bench/docker-compose.yml down
#
# Ports (host networking — each server binds directly on the host):
#   Ferrous-DNS:  0.0.0.0:5353/udp+tcp
#   Pi-hole:      0.0.0.0:5354/udp+tcp
#   AdGuard Home: 0.0.0.0:5355/udp+tcp
#   Unbound:      0.0.0.0:5356/udp+tcp
#   Blocky:       0.0.0.0:5357/udp+tcp
#   PowerDNS:     0.0.0.0:5358/udp+tcp
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Ferrous-DNS — high-performance DNS server (Rust)
  # Config: docker/bench/ferrous-dns-config.toml
  #   - Plain UDP upstreams (8.8.8.8 / 1.1.1.1), strategy: Parallel
  #   - Blocking disabled — isolates raw DNS forwarding performance
  #   - Caching enabled — production-like settings (200k entries, hit_rate eviction)
  #   - Log level: info
  # ---------------------------------------------------------------------------
  ferrous-dns:
    image: ferrousnetworking/ferrous-dns:latest
    container_name: bench-ferrous-dns
    network_mode: host
    volumes:
      - ./ferrous-dns-config.toml:/data/config/ferrous-dns-config.toml:ro
    environment:
      FERROUS_CONFIG: /data/config/ferrous-dns-config.toml
      FERROUS_DNS_PORT: 5353
      FERROUS_WEB_PORT: 9090
      FERROUS_BIND_ADDRESS: 0.0.0.0
      FERROUS_DATABASE: /tmp/ferrous-bench.db
      FERROUS_LOG_LEVEL: info
      RUST_LOG: info
      TZ: UTC
    cpuset: "0-15"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '16'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/ferrous-dns", "--version"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Pi-hole — DNS blocker (primary competitor)
  # ---------------------------------------------------------------------------
  pihole:
    image: pihole/pihole:latest
    container_name: bench-pihole
    network_mode: host
    environment:
      TZ: UTC
      WEBPASSWORD: bench123
      PIHOLE_DNS_1: 8.8.8.8
      PIHOLE_DNS_2: 1.1.1.1
      DNSSEC: "false"
      DNSMASQ_LISTENING: all
      DNSMASQ_OPTS: "--cache-size=10000 --port=5354"
      # FTL rate limiting disabled (Pi-hole v6 format)
      FTLCONF_dns_rateLimit_count: "0"
      FTLCONF_dns_port: "5354"
    volumes:
      - pihole_data:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
      - ./pihole.toml:/etc/pihole/pihole.toml:ro
    cpuset: "0-15"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '16'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dig", "+short", "+timeout=2", "-p", "5354", "google.com", "@127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # AdGuard Home — DNS blocker + DoH/DoT support
  # GOMAXPROCS=16 — Go runtime uses 16 OS threads
  # ---------------------------------------------------------------------------
  adguard:
    image: adguard/adguardhome:latest
    container_name: bench-adguard
    network_mode: host
    environment:
      GOMAXPROCS: 16
    volumes:
      - adguard_work:/opt/adguardhome/work
      - ./adguard-config:/opt/adguardhome/conf
    cpuset: "0-15"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '16'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Unbound — high-performance recursive DNS resolver
  # num-threads: 16 — matches CPU limit
  # ---------------------------------------------------------------------------
  unbound:
    image: mvance/unbound:latest
    container_name: bench-unbound
    network_mode: host
    volumes:
      - ./unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    cpuset: "0-15"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '16'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "drill", "-p", "5356", "google.com", "@127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Blocky — fast DNS proxy and ad-blocker (Go)
  # Config: docker/bench/blocky-config.yml
  #   - Plain UDP upstreams (8.8.8.8 / 1.1.1.1), strategy: parallel_best
  #   - Blocking disabled (no denylists)
  #   - Caching enabled (minTime: 60s, maxTime: 86400s, prefetching: true)
  #   - Log level: info
  # GOMAXPROCS=16 — Go runtime uses 16 OS threads
  # ---------------------------------------------------------------------------
  blocky:
    image: ghcr.io/0xerr0r/blocky:latest
    container_name: bench-blocky
    network_mode: host
    environment:
      GOMAXPROCS: 16
    volumes:
      - ./blocky-config.yml:/app/config.yml:ro
    cpuset: "0-15"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '16'
    restart: unless-stopped
    # Blocky runs on a scratch image (no shell/wget/dig). Use its built-in healthcheck subcommand.
    healthcheck:
      test: ["CMD", "/app/blocky", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # PowerDNS Recursor — high-performance recursive resolver (C++)
  # Config: bench/powerdns-recursor.conf
  #   - Plain UDP upstreams (8.8.8.8 / 1.1.1.1) via forward-zones-recurse
  #   - Cache enabled (200k entries, 300s TTL)
  #   - Log level: info (loglevel=5)
  #   - Rate limiting disabled (ratelimit=0)
  #   - threads=16 — matches CPU limit
  # ---------------------------------------------------------------------------
  powerdns:
    image: powerdns/pdns-recursor-master:latest
    container_name: bench-powerdns
    network_mode: host
    volumes:
      - ./powerdns-recursor.yml:/etc/powerdns/recursor.yml:ro
    cpuset: "0-15"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '16'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rec_control", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  pihole_data:
  pihole_dnsmasq:
  adguard_work:
